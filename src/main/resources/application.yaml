server:
  port: 8083
spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    Hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  issuer: product-orders-auth
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  key-id: ${JWT_KEY_ID}
  keystore:
    location: classpath:keystore/auth-keystore.p12
    password: ${JWT_KEYSTORE_PASSWORD}
    alias: auth-key

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
